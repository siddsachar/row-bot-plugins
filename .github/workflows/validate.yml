name: Validate plugins

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          path: row-bot-plugins

      - name: Checkout Row-Bot
        uses: actions/checkout@v4
        with:
          repository: siddsachar/row-bot
          ref: ${{ vars.ROW_BOT_REF || 'feat/plugin-system-v2' }}
          token: ${{ secrets.ROW_BOT_SOURCE_TOKEN || github.token }}
          path: row-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install "uv>=0.7,<1.0"

      - name: Sync Row-Bot test environment
        working-directory: row-bot
        run: uv sync --locked --all-extras --group test

      - name: Validate plugin marketplace
        working-directory: row-bot
        env:
          ROW_BOT_SOURCE: ${{ github.workspace }}\row-bot
        run: uv run python ..\row-bot-plugins\scripts\validate_repo.py ..\row-bot-plugins
